<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>Site cadastro utfpr</title>
</head>
<link rel="shortcut icon" href="UTFPR_logo.svg">
<body>

    <nav class="nav"> 

        <div class="btn-nav"> 
            <a href="index.html"><button>Inicio</button></a>
            <a href="#"><button>Salário</button></a>
            <a href="#"><button>Professor</button></a>
            <a href="#"><button>Acessar</button></a>
            <a href="#"><button id="btn-premium">Lista Premium</button></a>
            <a href="#"> <button id="btn-add">Virar Reitor</button></a>
        </div>

        <div id="logo">
            <a href="index.html"> <img src="UTFPR_logo.svg" height="10%"></a>
        </div>
    </nav> 

    <div class="main"> 

        <div class="inicio"> <!-- Inicio -->
            <h1>Faça cadastro <br> Se torne o novo Reitor da Utfpr.</h1>
            <img src="cat-astro.svg" class="img-login"alt="Cat">
        </div> <!-- Inicio -->

        <div class="login"> <!-- Login -->
            <div class="card-login"> <!-- card-login -->
                <h1>Cadastro</h1>

                <div class="textfield">
                    <label for="usuario">Usuário</label>
                    <input type="text" name="usuario" placeholder="Usuario">
                </div>

                <div class="textfield">
                    <label for="email">Email</label>
                    <input type="text" name="email" placeholder="Email">
                </div>

                <div class="textfield">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" placeholder="Senha">
                </div>

                <div class="label1"> <!-- divcheck -->
                <input type="checkbox">
                <label class="label1">Li e concordo com os termos da politica de provacidade </label> </div> <!-- divcheck --> 

                <button class="btn-cadastro">Cadastrar</button>
            </div> <!-- card-login -->
        </div> <!-- Login -->


    </div> <!-- divmain -->
    
</body>
</html>
